{% extends "shared/base.html" %}
{% block title %}{{ 'Editar' if transaction else 'Nueva' }} transacción{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
  <h1 class="text-2xl font-bold mb-6">{{ 'Editar' if transaction else 'Nueva' }} transacción</h1>
  <div class="card">
    <form method="POST" class="space-y-4">

      <div>
        <label class="label">Tipo *</label>
        <select name="type" class="input" required>
          <option value="expense" {{ 'selected' if transaction and transaction.type == 'expense' }}>Gasto</option>
          <option value="income"  {{ 'selected' if transaction and transaction.type == 'income' }}>Ingreso</option>
        </select>
      </div>

      <div>
        <label class="label">Monto *</label>
        <div class="flex">
          <span class="inline-flex items-center px-3 border border-r-0 border-gray-300 bg-gray-50 text-gray-500 rounded-l-lg text-sm">$</span>
          <input type="number" name="amount" step="0.01" min="0.01" class="input rounded-l-none" required
                 value="{{ transaction.amount if transaction else '' }}"/>
        </div>
      </div>

      <div>
        <label class="label">Fecha *</label>
        <input type="date" name="date" class="input" required
               value="{{ transaction.date.isoformat() if transaction else today }}"/>
      </div>

      <div>
        <label class="label">Cuenta *</label>
        <select name="account_id" class="input" required>
          {% for acc in accounts %}
            <option value="{{ acc.id }}" {{ 'selected' if transaction and transaction.account_id == acc.id }}>
              {{ acc.name }}
            </option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="label">Categoría *</label>
        <select name="category_id" class="input" required>
          {% for cat in categories %}
            <option value="{{ cat.id }}" {{ 'selected' if transaction and transaction.category_id == cat.id }}>
              {{ cat.name }} ({{ 'ingreso' if cat.type == 'income' else 'gasto' }})
            </option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="label">Descripción <span class="text-gray-400 font-normal">(opcional)</span></label>
        <input type="text" name="description" class="input" maxlength="255"
               value="{{ transaction.description if transaction else '' }}"/>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit" class="btn-primary">Guardar</button>
        <a href="{{ url_for('transactions.index') }}" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
