{% extends "shared/base.html" %}
{% block title %}{{ 'Editar' if account else 'Nueva' }} cuenta{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
  <h1 class="text-2xl font-bold mb-6">{{ 'Editar' if account else 'Nueva' }} cuenta</h1>
  <div class="card">
    <form method="POST" class="space-y-4">
      <div>
        <label class="label">Nombre *</label>
        <input type="text" name="name" class="input" required maxlength="255"
               value="{{ account.name if account else '' }}" autofocus/>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="submit" class="btn-primary">Guardar</button>
        <a href="{{ url_for('accounts.index') }}" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
