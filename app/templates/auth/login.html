{% extends "shared/base.html" %}
{% block title %}Iniciar sesión{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <div class="w-full max-w-sm">
    <h1 class="text-2xl font-bold text-center mb-6">Iniciar sesión</h1>
    <div class="card">
      <form method="POST" class="space-y-4">
        <div>
          <label class="label">Email</label>
          <input type="email" name="email" class="input" required autofocus/>
        </div>
        <div>
          <label class="label">Contraseña</label>
          <input type="password" name="password" class="input" required/>
        </div>
        <button type="submit" class="btn-primary w-full mt-2">Entrar</button>
      </form>
    </div>
    <p class="text-center text-sm text-gray-500 mt-4">
      ¿No tenés cuenta?
      <a href="{{ url_for('auth.register') }}" class="text-green-600 hover:underline font-medium">Registrate</a>
    </p>
  </div>
</div>
{% endblock %}
